name: 판호 수집

on:
  schedule:
    - cron: '0 2 20 * *'
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install httpx beautifulsoup4

      - name: 데이터 수집
        run: cd scripts && python collect.py

      - name: 변경사항 커밋
        run: |
          git config user.name "판호봇"
          git config user.email "bot@noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "판호 업데이트" && git push)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: React 빌드
        run: |
          cd frontend
          npm install
          npm run build

      - name: data 폴더 복사
        run: cp -r data frontend/dist/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
