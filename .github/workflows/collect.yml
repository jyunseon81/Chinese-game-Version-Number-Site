name: 판호 수집

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install httpx beautifulsoup4

      - name: 데이터 수집
        run: python scripts/collect.py

      - name: 수집된 data 폴더 확인
        run: ls -la data/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: React 빌드
        run: |
          cd frontend
          npm install
          npm run build

      - name: data 폴더 복사
        run: |
          cp -r data frontend/dist/data
          ls -la frontend/dist/data/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
